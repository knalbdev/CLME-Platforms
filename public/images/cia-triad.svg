<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" font-family="system-ui,-apple-system,sans-serif">
  <rect width="760" height="280" rx="16" fill="#f8fafc"/>

  <!-- C Card -->
  <rect x="20" y="20" width="225" height="240" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <rect x="20" y="20" width="225" height="6" rx="14" fill="#2563eb"/>
  <rect x="20" y="24" width="225" height="2" fill="#2563eb"/>
  <text x="132" y="72" text-anchor="middle" font-size="38">🔒</text>
  <text x="132" y="110" text-anchor="middle" font-size="15" font-weight="800" fill="#1d4ed8">CONFIDENTIALITY</text>
  <text x="132" y="130" text-anchor="middle" font-size="12" fill="#1e40af">(Kerahasiaan)</text>
  <line x1="50" y1="148" x2="215" y2="148" stroke="#bfdbfe" stroke-width="1"/>
  <text x="132" y="170" text-anchor="middle" font-size="11" fill="#374151">Data hanya bisa diakses</text>
  <text x="132" y="187" text-anchor="middle" font-size="11" fill="#374151">oleh pihak yang berwenang.</text>
  <text x="132" y="210" text-anchor="middle" font-size="11" fill="#6b7280">Contoh: Nilai rapor siswa</text>
  <text x="132" y="227" text-anchor="middle" font-size="11" fill="#6b7280">hanya untuk wali kelas.</text>

  <!-- I Card -->
  <rect x="267" y="20" width="225" height="240" rx="14" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <rect x="267" y="20" width="225" height="6" rx="14" fill="#16a34a"/>
  <rect x="267" y="24" width="225" height="2" fill="#16a34a"/>
  <text x="380" y="72" text-anchor="middle" font-size="38">✅</text>
  <text x="380" y="110" text-anchor="middle" font-size="15" font-weight="800" fill="#15803d">INTEGRITY</text>
  <text x="380" y="130" text-anchor="middle" font-size="12" fill="#166534">(Integritas)</text>
  <line x1="297" y1="148" x2="462" y2="148" stroke="#bbf7d0" stroke-width="1"/>
  <text x="380" y="170" text-anchor="middle" font-size="11" fill="#374151">Data hanya bisa diubah</text>
  <text x="380" y="187" text-anchor="middle" font-size="11" fill="#374151">oleh pihak yang berwenang.</text>
  <text x="380" y="210" text-anchor="middle" font-size="11" fill="#6b7280">Contoh: Nilai di Dapodik</text>
  <text x="380" y="227" text-anchor="middle" font-size="11" fill="#6b7280">tidak bisa dimodifikasi.</text>

  <!-- A Card -->
  <rect x="514" y="20" width="226" height="240" rx="14" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <rect x="514" y="20" width="226" height="6" rx="14" fill="#ea580c"/>
  <rect x="514" y="24" width="226" height="2" fill="#ea580c"/>
  <text x="627" y="72" text-anchor="middle" font-size="38">🌐</text>
  <text x="627" y="110" text-anchor="middle" font-size="15" font-weight="800" fill="#c2410c">AVAILABILITY</text>
  <text x="627" y="130" text-anchor="middle" font-size="12" fill="#9a3412">(Ketersediaan)</text>
  <line x1="544" y1="148" x2="710" y2="148" stroke="#fed7aa" stroke-width="1"/>
  <text x="627" y="170" text-anchor="middle" font-size="11" fill="#374151">Sistem tersedia saat</text>
  <text x="627" y="187" text-anchor="middle" font-size="11" fill="#374151">dibutuhkan pengguna.</text>
  <text x="627" y="210" text-anchor="middle" font-size="11" fill="#6b7280">Contoh: Portal presensi</text>
  <text x="627" y="227" text-anchor="middle" font-size="11" fill="#6b7280">harus bisa diakses tiap hari.</text>
</svg>
