<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" font-family="system-ui,-apple-system,sans-serif">
  <rect width="760" height="240" rx="16" fill="#f5f3ff"/>
  <text x="380" y="28" text-anchor="middle" font-size="14" font-weight="800" fill="#2e1065">Strategi Backup 3-2-1 — Standar Emas Keamanan Data</text>
  <text x="380" y="46" text-anchor="middle" font-size="11" fill="#6d28d9">Direkomendasikan NIST, FBI, dan CISA untuk semua organisasi termasuk sekolah</text>

  <!-- 3 salinan -->
  <rect x="20" y="60" width="220" height="168" rx="14" fill="white" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="130" cy="96" r="28" fill="#7c3aed"/>
  <text x="130" y="106" text-anchor="middle" font-size="28" font-weight="900" fill="white">3</text>
  <text x="130" y="136" text-anchor="middle" font-size="13" font-weight="800" fill="#4c1d95">SALINAN DATA</text>
  <line x1="50" y1="150" x2="210" y2="150" stroke="#ede9fe" stroke-width="1"/>
  <text x="130" y="170" text-anchor="middle" font-size="10" fill="#374151">1 file asli (original)</text>
  <text x="130" y="186" text-anchor="middle" font-size="10" fill="#374151">+ 2 salinan backup</text>
  <text x="130" y="202" text-anchor="middle" font-size="10" fill="#6b7280">Jika 1 rusak, masih ada 2 lagi</text>
  <text x="130" y="220" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="700">💡 Prinsip redundansi</text>

  <!-- 2 media -->
  <rect x="270" y="60" width="220" height="168" rx="14" fill="white" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="380" cy="96" r="28" fill="#5b21b6"/>
  <text x="380" y="106" text-anchor="middle" font-size="28" font-weight="900" fill="white">2</text>
  <text x="380" y="136" text-anchor="middle" font-size="13" font-weight="800" fill="#4c1d95">JENIS MEDIA</text>
  <line x1="300" y1="150" x2="460" y2="150" stroke="#ede9fe" stroke-width="1"/>
  <text x="380" y="170" text-anchor="middle" font-size="10" fill="#374151">💻 Komputer / laptop</text>
  <text x="380" y="186" text-anchor="middle" font-size="10" fill="#374151">+ 💾 HDD / flashdisk</text>
  <text x="380" y="202" text-anchor="middle" font-size="10" fill="#6b7280">Media berbeda = risiko berbeda</text>
  <text x="380" y="220" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="700">💡 Prinsip diversifikasi</text>

  <!-- 1 offsite -->
  <rect x="520" y="60" width="220" height="168" rx="14" fill="white" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="630" cy="96" r="28" fill="#4c1d95"/>
  <text x="630" y="106" text-anchor="middle" font-size="28" font-weight="900" fill="white">1</text>
  <text x="630" y="136" text-anchor="middle" font-size="13" font-weight="800" fill="#4c1d95">LOKASI OFFSITE</text>
  <line x1="550" y1="150" x2="710" y2="150" stroke="#ede9fe" stroke-width="1"/>
  <text x="630" y="170" text-anchor="middle" font-size="10" fill="#374151">☁️ Google Drive / OneDrive</text>
  <text x="630" y="186" text-anchor="middle" font-size="10" fill="#374151">di luar lokasi fisik Anda</text>
  <text x="630" y="202" text-anchor="middle" font-size="10" fill="#6b7280">Kebakaran/banjir tidak merusak</text>
  <text x="630" y="220" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="700">💡 Gratis: Google Drive 15 GB</text>
</svg>
