  <text x="95" y="184" text-anchor="middle" font-size="8" fill="#b91c1c">🔑 Sering tak terdeteksi</text>

  <!-- Arrow -->
  <text x="188" y="130" font-size="22" fill="#ef4444">→</text>

  <!-- Stage 2 -->
  <rect x="200" y="56" width="170" height="134" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
