  <text x="475" y="170" text-anchor="middle" font-size="9" fill="#854d0e">Bayar crypto = $500–$5000</text>
  <text x="475" y="184" text-anchor="middle" font-size="8" fill="#a16207">🚫 FBI: JANGAN BAYAR!</text>

  <!-- Arrow -->
  <text x="568" y="130" font-size="22" fill="#ef4444">→</text>

  <!-- Stage 4 -->
  <rect x="580" y="56" width="170" height="134" rx="12" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <rect x="580" y="56" width="170" height="36" rx="12" fill="#7e22ce"/>
  <rect x="580" y="80" width="170" height="12" fill="#7e22ce"/>
  <text x="665" y="78" text-anchor="middle" font-size="12" font-weight="800" fill="white">④ ANCAMAN GANDA</text>
