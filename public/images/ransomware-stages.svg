  <!-- Stage 3 -->
  <rect x="390" y="56" width="170" height="134" rx="12" fill="#fef9c3" stroke="#fef08a" stroke-width="1.5"/>
  <rect x="390" y="56" width="170" height="36" rx="12" fill="#a16207"/>
  <rect x="390" y="80" width="170" height="12" fill="#a16207"/>
  <text x="475" y="78" text-anchor="middle" font-size="12" font-weight="800" fill="white">③ TEBUSAN</text>
  <text x="475" y="116" text-anchor="middle" font-size="20">💰</text>
  <text x="475" y="142" text-anchor="middle" font-size="10" fill="#713f12" font-weight="700">Layar merah muncul</text>
