<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" font-family="system-ui,-apple-system,sans-serif">
  <rect width="760" height="260" rx="16" fill="#f0fdf4"/>
  <text x="380" y="28" text-anchor="middle" font-size="14" font-weight="800" fill="#14532d">5 Lapisan Keamanan HP yang Wajib Diaktifkan</text>
  <text x="380" y="46" text-anchor="middle" font-size="11" fill="#166534">HP Anda menyimpan akses ke email, banking, Dapodik — lindungi sekarang</text>

  <!-- Row 1 -->
  <rect x="20" y="60" width="220" height="90" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="42" y="94" font-size="28">🔐</text>
  <text x="80" y="90" font-size="12" font-weight="700" fill="#14532d">Kunci Layar Kuat</text>
  <text x="80" y="106" font-size="10" fill="#374151">PIN 6 digit / pola kompleks</text>
  <text x="80" y="120" font-size="10" fill="#374151">atau biometrik (sidik jari)</text>
  <rect x="30" y="132" width="200" height="12" rx="6" fill="#dcfce7"/>
  <text x="130" y="142" text-anchor="middle" font-size="9" fill="#15803d" font-weight="700">Setelan → Keamanan → Kunci Layar</text>

  <rect x="270" y="60" width="220" height="90" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="292" y="94" font-size="28">🔎</text>
  <text x="330" y="90" font-size="12" font-weight="700" fill="#14532d">Find My Device</text>
  <text x="330" y="106" font-size="10" fill="#374151">Lacak &amp; hapus data</text>
  <text x="330" y="120" font-size="10" fill="#374151">dari jarak jauh jika hilang</text>
  <rect x="280" y="132" width="200" height="12" rx="6" fill="#dcfce7"/>
  <text x="380" y="142" text-anchor="middle" font-size="9" fill="#15803d" font-weight="700">Setelan → Keamanan → Find My Device</text>

  <rect x="520" y="60" width="220" height="90" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="542" y="94" font-size="28">🔄</text>
  <text x="580" y="90" font-size="12" font-weight="700" fill="#14532d">Update OS Tepat Waktu</text>
  <text x="580" y="106" font-size="10" fill="#374151">Update = patch keamanan</text>
  <text x="580" y="120" font-size="10" fill="#374151">kritis. Jangan tunda!</text>
  <rect x="530" y="132" width="200" height="12" rx="6" fill="#dcfce7"/>
  <text x="630" y="142" text-anchor="middle" font-size="9" fill="#15803d" font-weight="700">Setelan → Tentang HP → Pembaruan</text>

  <!-- Row 2 -->
  <rect x="145" y="168" width="220" height="82" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="167" y="200" font-size="28">🔒</text>
  <text x="205" y="197" font-size="12" font-weight="700" fill="#14532d">Enkripsi Perangkat</text>
  <text x="205" y="212" font-size="10" fill="#374151">Android modern: otomatis aktif</text>
  <text x="205" y="226" font-size="10" fill="#374151">iOS: aktif saat ada screen lock</text>
  <text x="255" y="242" text-anchor="middle" font-size="9" fill="#15803d" font-weight="700">✓ Cek di Setelan → Keamanan</text>

  <rect x="395" y="168" width="220" height="82" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="417" y="200" font-size="28">☁️</text>
  <text x="455" y="197" font-size="12" font-weight="700" fill="#14532d">Backup Otomatis</text>
  <text x="455" y="212" font-size="10" fill="#374151">Google Photos / iCloud</text>
  <text x="455" y="226" font-size="10" fill="#374151">Data aman jika HP hilang/rusak</text>
  <text x="505" y="242" text-anchor="middle" font-size="9" fill="#15803d" font-weight="700">✓ Aktifkan di pengaturan akun Google</text>
</svg>
