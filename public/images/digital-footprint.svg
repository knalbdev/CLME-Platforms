<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 290" font-family="system-ui,-apple-system,sans-serif">
  <rect width="760" height="290" rx="16" fill="#f8fafc"/>
  <text x="380" y="32" text-anchor="middle" font-size="14" font-weight="800" fill="#0f172a">Dua Jenis Jejak Digital yang Anda Tinggalkan</text>
  <text x="380" y="50" text-anchor="middle" font-size="11" fill="#64748b">Semua aktivitas online meninggalkan jejak yang bisa bertahan puluhan tahun</text>

  <!-- Aktif -->
  <rect x="20" y="64" width="350" height="216" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <rect x="20" y="64" width="350" height="44" rx="12" fill="#1d4ed8"/>
  <rect x="20" y="96" width="350" height="12" fill="#1d4ed8"/>
  <text x="195" y="90" text-anchor="middle" font-size="14" font-weight="800" fill="white">👆 Jejak AKTIF</text>
  <text x="195" y="104" text-anchor="middle" font-size="10" fill="#bfdbfe">Anda buat secara sadar dan sengaja</text>

  <text x="40" y="136" font-size="11" fill="#1e40af">📝  Postingan &amp; komentar di media sosial</text>
  <text x="40" y="158" font-size="11" fill="#1e40af">📸  Foto &amp; video yang Anda unggah</text>
  <text x="40" y="180" font-size="11" fill="#1e40af">📋  Formulir pendaftaran online</text>
  <text x="40" y="202" font-size="11" fill="#1e40af">🛒  Riwayat pembelian di toko online</text>
  <text x="40" y="224" font-size="11" fill="#1e40af">💬  Pesan di forum &amp; grup online</text>

  <rect x="30" y="240" width="330" height="32" rx="8" fill="#dbeafe"/>
  <text x="195" y="254" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="700">⚠️ Bisa dihapus tapi jejak tersimpan di cache</text>
  <text x="195" y="266" text-anchor="middle" font-size="10" fill="#1e40af">Screenshot &amp; arsip web tetap ada selamanya</text>

  <!-- Pasif -->
  <rect x="390" y="64" width="350" height="216" rx="12" fill="#fef3c7" stroke="#fde68a" stroke-width="1.5"/>
  <rect x="390" y="64" width="350" height="44" rx="12" fill="#b45309"/>
  <rect x="390" y="96" width="350" height="12" fill="#b45309"/>
  <text x="565" y="90" text-anchor="middle" font-size="14" font-weight="800" fill="white">👁️ Jejak PASIF</text>
  <text x="565" y="104" text-anchor="middle" font-size="10" fill="#fde68a">Dikumpulkan tanpa Anda sadari</text>

  <text x="410" y="136" font-size="11" fill="#78350f">🍪  Cookies — situs melacak kunjungan Anda</text>
  <text x="410" y="158" font-size="11" fill="#78350f">📍  Metadata GPS dalam foto smartphone</text>
  <text x="410" y="180" font-size="11" fill="#78350f">🔍  Riwayat pencarian Google</text>
  <text x="410" y="202" font-size="11" fill="#78350f">📱  Aktivitas aplikasi di latar belakang</text>
  <text x="410" y="224" font-size="11" fill="#78350f">🌐  Alamat IP &amp; lokasi perkiraan</text>

  <rect x="400" y="240" width="330" height="32" rx="8" fill="#fde68a"/>
  <text x="565" y="254" text-anchor="middle" font-size="10" fill="#78350f" font-weight="700">⚠️ Bahaya: foto di rumah/sekolah mengandung</text>
  <text x="565" y="266" text-anchor="middle" font-size="10" fill="#78350f">koordinat GPS lokasi persis — bisa diekstrak!</text>
</svg>
